name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format + Check + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: rustfmt (check)
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets --locked

      - name: cargo build (release)
        run: cargo build --release --locked

  tests:
    name: Unit + fast integration tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Library tests
        run: cargo test --lib --locked

      - name: Non-DB integration tests
        run: cargo test --test connections --test validation --locked

  sql-integration:
    name: SQL integration tests (Postgres/MySQL/SQLite)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Start test databases
        run: docker compose -f tests/docker-compose.yml up -d

      - name: Wait for test databases to be healthy
        run: |
          set -euo pipefail

          for i in {1..90}; do
            pg="$(docker inspect --format='{{.State.Health.Status}}' shellql-postgres-test 2>/dev/null || echo starting)"
            my="$(docker inspect --format='{{.State.Health.Status}}' shellql-mysql-test 2>/dev/null || echo starting)"
            sq="$(docker inspect --format='{{.State.Health.Status}}' shellql-sqlite-test 2>/dev/null || echo starting)"

            echo "postgres=$pg mysql=$my sqlite=$sq"

            if [ "$pg" = "healthy" ] && [ "$my" = "healthy" ] && [ "$sq" = "healthy" ]; then
              echo "All services are healthy"
              exit 0
            fi

            sleep 2
          done

          echo "Timed out waiting for services to become healthy"
          docker compose -f tests/docker-compose.yml ps
          exit 1

      - name: SQL integration test suites
        run: cargo test --test sql_integration --test sql_prebuilt_queries_integration --locked

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f tests/docker-compose.yml logs --no-color

      - name: Stop test databases
        if: always()
        run: docker compose -f tests/docker-compose.yml down -v
